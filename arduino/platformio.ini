[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
lib_deps = 
	genereeves/ArduinoStreaming@^5
	bolderflight/Bolder Flight Systems MPU9250@^1.0.2
	aster94/SensorFusion@^1.0.6
	rb-enantel/RC_ESC@^1.1.0
	bolderflight/Bolder Flight Systems Controls@^4.0.0
